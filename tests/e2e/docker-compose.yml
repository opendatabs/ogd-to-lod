services:
  fuseki:
    image: stain/jena-fuseki
    platform: linux/amd64
    container_name: fuseki
    ports:
      - "3030:3030"
    environment:
      - ADMIN_PASSWORD=admin
      - JVM_ARGS=-Xmx2g
      - FUSEKI_DATASET_1=test
    volumes:
      - ./fuseki-data:/fuseki
    restart: unless-stopped
