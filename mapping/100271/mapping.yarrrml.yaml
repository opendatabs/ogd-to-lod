prefixes:
  rml: "http://semweb.mmlab.be/ns/rml#"
  rr: "http://www.w3.org/ns/r2rml#"
  ql: "http://semweb.mmlab.be/ns/ql#"
  csvw: "http://www.w3.org/ns/csvw#"
  schema: "http://schema.org/"
  cube: "https://cube.link/"
  xsd: "http://www.w3.org/2001/XMLSchema#"
  ex: "https://ld.bs.ch/100271/"
  ex-obs: "https://ld.bs.ch/100271/observation/"
  ex-property: "https://ld.bs.ch/property/"
  ex-code: "https://ld.bs.ch/code/"

sources:
  csvSource:
    access: "{CSV_SOURCE}"
    referenceFormulation: csv

mappings:
  observations:
    sources:
      - csvSource
    s: "ex-obs:$(timestamp)_$(methode)"
    po:
      - [a, cube:Observation]
      - ["ex-property:ZEIT", $(timestamp), xsd:dateTime]
      - ["ex-property:RAUM", "ex-code:Rhein_Basel_Rheinhalle~iri"]
      - ["ex-property:methode", $(methode)]
      - ["ex-property:ausgegeben_an", $(ausgegeben_an), xsd:dateTime]
      - ["ex-property:meteolauf", $(meteolauf), xsd:dateTime]
      - ["ex-property:gemessene_werten_bis", $(gemessene_werten_bis), xsd:dateTime]
      - ["ex-property:wasserstand", $(wasserstand), xsd:decimal]
      - ["ex-property:abfluss", $(abfluss), xsd:decimal]
      - ["ex-property:h_min", $(h_min), xsd:decimal]
      - ["ex-property:h_p25", $(h_p25), xsd:decimal]
      - ["ex-property:h_p50", $(h_p50), xsd:decimal]
      - ["ex-property:h_p75", $(h_p75), xsd:decimal]
      - ["ex-property:h_max", $(h_max), xsd:decimal]
      - ["ex-property:q_min", $(q_min), xsd:decimal]
      - ["ex-property:q_p25", $(q_p25), xsd:decimal]
      - ["ex-property:q_p50", $(q_p50), xsd:decimal]
      - ["ex-property:q_p75", $(q_p75), xsd:decimal]
      - ["ex-property:q_max", $(q_max), xsd:decimal]

  methodCodes:
    sources:
      - csvSource
    s: "ex-code:$(methode)"
    po:
      - [a, schema:DefinedTerm]
      - [schema:name, $(methode)]

  raumCode:
    sources:
      - csvSource
    s: "ex-code:Rhein_Basel_Rheinhalle"
    po:
      - [a, schema:DefinedTerm]
      - [schema:name, "Rhein - Basel, Rheinhalle"]

  observationSetLink:
    sources:
      - csvSource
    s: ex:observation-set
    po:
      - [cube:observation, "ex-obs:$(timestamp)_$(methode)~iri"]