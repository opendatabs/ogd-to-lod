prefixes:
  rml: "http://semweb.mmlab.be/ns/rml#"
  rr: "http://www.w3.org/ns/r2rml#"
  ql: "http://semweb.mmlab.be/ns/ql#"
  csvw: "http://www.w3.org/ns/csvw#"
  schema: "http://schema.org/"
  cube: "https://cube.link/"
  xsd: "http://www.w3.org/2001/XMLSchema#"
  ex: "https://ld.bs.ch/100384/"
  ex-obs: "https://ld.bs.ch/100384/observation/"
  ex-property: "https://ld.bs.ch/property/"
  ex-code: "https://ld.bs.ch/code/"

sources:
  csvSource:
    access: "{CSV_SOURCE}"
    referenceFormulation: csv

mappings:
  observations:
    sources:
      - csvSource
    s: "ex-obs:$(zeitpunkt_job)_$(name)"
    po:
      - [a, cube:Observation]
      - ["ex-property:ZEIT", "$(zeitpunkt_job)", xsd:dateTime]
      - ["ex-property:RAUM", "ex-code:$(name)~iri"]
      - ["ex-property:KOORDINATEN", "$(koordinaten)", xsd:string]
      - ["ex-property:TEMPERATUR", "$(temperatur)", xsd:integer]
  bathNames:
    sources:
      - csvSource
    s: "ex-code:$(name)"
    po:
      - [a, schema:DefinedTerm]
      - [schema:name, "$(name)", xsd:string]
  observationSetLink:
    sources:
      - csvSource
    s: ex:observation-set
    po:
      - [cube:observation, "ex-obs:$(zeitpunkt_job)_$(name)~iri"]