    s: ex:observation-set
    po:
      - [cube:observation, "ex-obs:$(timestamp)_g131_o3~iri"]

  observationSetLink_g131_pm25:
    sources:
      - csvSource
    s: ex:observation-set
    po:
      - [cube:observation, "ex-obs:$(timestamp)_g131_pm25~iri"]