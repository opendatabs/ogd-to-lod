prefixes:
  rml: "http://semweb.mmlab.be/ns/rml#"
  rr: "http://www.w3.org/ns/r2rml#"
  ql: "http://semweb.mmlab.be/ns/ql#"
  csvw: "http://www.w3.org/ns/csvw#"
  schema: "http://schema.org/"
  cube: "https://cube.link/"
  xsd: "http://www.w3.org/2001/XMLSchema#"
  ex: "https://ld.bs.ch/100093/"
  ex-obs: "https://ld.bs.ch/100093/observation/"
  ex-property: "https://ld.bs.ch/property/"
  ex-code: "https://ld.bs.ch/code/"

sources:
  csvSource:
    access: "{CSV_SOURCE}"
    referenceFormulation: csv

mappings:

  observation_g107_no2:
    sources:
      - csvSource
    s: "ex-obs:$(timestamp)_g107_no2"
    po:
      - [a, cube:Observation]
      - ["ex-property:ZEIT", "$(timestamp)", xsd:dateTime]
      - ["ex-property:sensor", "ex-code:g107~iri"]
      - ["ex-property:pollutant", "ex-code:NO2~iri"]
      - ["ex-property:RAUM", "ex-code:location~iri"]
      - ["ex-property:g107_no2", "$(g107_no2)", xsd:decimal]

  observation_g107_o3:
    sources:
      - csvSource
    s: "ex-obs:$(timestamp)_g107_o3"
    po:
      - [a, cube:Observation]
      - ["ex-property:ZEIT", "$(timestamp)", xsd:dateTime]
      - ["ex-property:sensor", "ex-code:g107~iri"]
      - ["ex-property:pollutant", "ex-code:O3~iri"]
      - ["ex-property:RAUM", "ex-code:location~iri"]
      - ["ex-property:g107_o3", "$(g107_03)", xsd:decimal]

  observation_g107_pm25:
    sources:
      - csvSource
    s: "ex-obs:$(timestamp)_g107_pm25"
    po:
      - [a, cube:Observation]
      - ["ex-property:ZEIT", "$(timestamp)", xsd:dateTime]
      - ["ex-property:sensor", "ex-code:g107~iri"]
      - ["ex-property:pollutant", "ex-code:PM2_5~iri"]
      - ["ex-property:RAUM", "ex-code:location~iri"]
      - ["ex-property:g107_pm25", "$(g107_pm25)", xsd:decimal]

  observation_g125_no2:
    sources:
      - csvSource
    s: "ex-obs:$(timestamp)_g125_no2"
    po:
      - [a, cube:Observation]
      - ["ex-property:ZEIT", "$(timestamp)", xsd:dateTime]
      - ["ex-property:sensor", "ex-code:g125~iri"]
      - ["ex-property:pollutant", "ex-code:NO2~iri"]
      - ["ex-property:RAUM", "ex-code:location~iri"]
      - ["ex-property:g125_no2", "$(g125_no2)", xsd:decimal]

  observation_g125_o3:
    sources:
      - csvSource
    s: "ex-obs:$(timestamp)_g125_o3"
    po:
      - [a, cube:Observation]
      - ["ex-property:ZEIT", "$(timestamp)", xsd:dateTime]
      - ["ex-property:sensor", "ex-code:g125~iri"]
      - ["ex-property:pollutant", "ex-code:O3~iri"]
      - ["ex-property:RAUM", "ex-code:location~iri"]
