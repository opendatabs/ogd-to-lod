  observation_g131_o3:
    sources:
      - csvSource
    s: "ex-obs:$(timestamp)_g131_o3"
    po:
      - [a, cube:Observation]
      - ["ex-property:ZEIT", "$(timestamp)", xsd:dateTime]
      - ["ex-property:sensor", "ex-code:g131~iri"]
      - ["ex-property:pollutant", "ex-code:O3~iri"]
      - ["ex-property:RAUM", "ex-code:location~iri"]
      - ["ex-property:g131_o3", "$(g131_o3)", xsd:decimal]

  observation_g131_pm25:
    sources:
      - csvSource
    s: "ex-obs:$(timestamp)_g131_pm25"
    po:
      - [a, cube:Observation]
      - ["ex-property:ZEIT", "$(timestamp)", xsd:dateTime]
      - ["ex-property:sensor", "ex-code:g131~iri"]
      - ["ex-property:pollutant", "ex-code:PM2_5~iri"]
      - ["ex-property:RAUM", "ex-code:location~iri"]
      - ["ex-property:g131_pm25", "$(g131_pm25)", xsd:decimal]

  sensorCodes:
    sources:
      - csvSource
    s: "ex-code:g107"
    po:
      - [a, schema:DefinedTerm]
      - [schema:name, "g107"]
    s2: "ex-code:g125"
    po2:
      - [a, schema:DefinedTerm]
      - [schema:name, "g125"]
    s3: "ex-code:g131"
    po3:
      - [a, schema:DefinedTerm]
      - [schema:name, "g131"]

  pollutantCodes:
    sources:
      - csvSource
    s: "ex-code:NO2"
    po:
      - [a, schema:DefinedTerm]
      - [schema:name, "NO2"]
    s2: "ex-code:O3"
    po2:
      - [a, schema:DefinedTerm]
      - [schema:name, "O3"]
    s3: "ex-code:PM2_5"
    po3:
      - [a, schema:DefinedTerm]
      - [schema:name, "PM2.5"]

  locationCode:
    sources:
      - csvSource
    s: "ex-code:location"
    po:
      - [a, schema:DefinedTerm]
      - [schema:name, "St. Johanns-Platz, Feldbergastrasse, Autobahn A2 in der Hard, Gundeldingerstrasse (Basel, Switzerland)"]

  observationSetLink_g107_no2:
    sources:
      - csvSource
    s: ex:observation-set
    po:
      - [cube:observation, "ex-obs:$(timestamp)_g107_no2~iri"]

  observationSetLink_g107_o3:
    sources:
      - csvSource
    s: ex:observation-set
    po:
      - [cube:observation, "ex-obs:$(timestamp)_g107_o3~iri"]

  observationSetLink_g107_pm25:
    sources:
      - csvSource
    s: ex:observation-set
    po:
      - [cube:observation, "ex-obs:$(timestamp)_g107_pm25~iri"]

  observationSetLink_g125_no2:
    sources:
      - csvSource
    s: ex:observation-set
    po:
      - [cube:observation, "ex-obs:$(timestamp)_g125_no2~iri"]

  observationSetLink_g125_o3:
    sources:
      - csvSource
    s: ex:observation-set
    po:
