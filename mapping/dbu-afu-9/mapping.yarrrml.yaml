prefixes:
  rml: "http://semweb.mmlab.be/ns/rml#"
  rr: "http://www.w3.org/ns/r2rml#"
  ql: "http://semweb.mmlab.be/ns/ql#"
  csvw: "http://www.w3.org/ns/csvw#"
  schema: "http://schema.org/"
  cube: "https://cube.link/"
  xsd: "http://www.w3.org/2001/XMLSchema#"
  ex: "https://ld.tg.ch/dbu-afu-9/"
  ex-obs: "https://ld.tg.ch/dbu-afu-9/observation/"
  ex-property: "https://ld.tg.ch/property/"
  ex-code: "https://ld.tg.ch/code/"

sources:
  csvSource:
    access: "{CSV_SOURCE}"
    referenceFormulation: csv

mappings:
  observations:
    sources:
      - csvSource
    s: "ex-obs:$(obj_id)_$(timestamp)"
    po:
      - [a, cube:Observation]
      - ["ex-property:ZEIT", "$(timestamp)", xsd:dateTime]
      - ["ex-property:RAUM", "ex-code:$(messgruppierung_ortsbezeichnung)~iri"]
      - ["ex-property:obj_id", "ex-code:$(obj_id)~iri"]
      - ["ex-property:parameter", "ex-code:$(parameter)~iri"]
      - ["ex-property:verantwortlichkeit_organisation", "ex-code:$(verantwortlichkeit_organisation)~iri"]
      - ["ex-property:einheit", "ex-code:$(einheit)~iri"]
      - ["ex-property:wert", "$(wert)", xsd:decimal]

  raumCodes:
    sources:
      - csvSource
    s: "ex-code:$(messgruppierung_ortsbezeichnung)"
    po:
      - [a, schema:DefinedTerm]
      - [schema:name, "$(messgruppierung_ortsbezeichnung)"]

  objIdCodes:
    sources:
      - csvSource
    s: "ex-code:$(obj_id)"
    po:
      - [a, schema:DefinedTerm]
      - [schema:name, "$(obj_id)"]

  parameterCodes:
    sources:
      - csvSource
    s: "ex-code:$(parameter)"
    po:
      - [a, schema:DefinedTerm]
      - [schema:name, "$(parameter)"]

  verantwortlichkeitOrganisationCodes:
    sources:
      - csvSource
    s: "ex-code:$(verantwortlichkeit_organisation)"
    po:
      - [a, schema:DefinedTerm]
      - [schema:name, "$(verantwortlichkeit_organisation)"]

  einheitCodes:
    sources:
      - csvSource
    s: "ex-code:$(einheit)"
    po:
      - [a, schema:DefinedTerm]
      - [schema:name, "$(einheit)"]

  observationSetLink:
    sources:
      - csvSource
    s: ex:observation-set
    po:
      - [cube:observation, "ex-obs:$(obj_id)_$(timestamp)~iri"]