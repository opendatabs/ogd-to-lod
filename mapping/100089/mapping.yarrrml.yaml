prefixes:
  rml: "http://semweb.mmlab.be/ns/rml#"
  rr: "http://www.w3.org/ns/r2rml#"
  ql: "http://semweb.mmlab.be/ns/ql#"
  csvw: "http://www.w3.org/ns/csvw#"
  schema: "http://schema.org/"
  cube: "https://cube.link/"
  xsd: "http://www.w3.org/2001/XMLSchema#"
  ex: "https://ld.bs.ch/100089/"
  ex-obs: "https://ld.bs.ch/100089/observation/"
  ex-property: "https://ld.bs.ch/property/"
  ex-code: "https://ld.bs.ch/code/"

sources:
  csvSource:
    access: "{CSV_SOURCE}"
    referenceFormulation: csv

mappings:
  observations:
    sources:
      - csvSource
    s: "ex-obs:$(timestamp)"
    po:
      - [a, cube:Observation]
      - ["ex-property:ZEIT", "$(timestamp)", xsd:dateTime]
      - ["ex-property:RAUM", "ex-code:basel_klb_birs~iri"]
      - ["ex-property:abfluss", "$(abfluss)", xsd:decimal]
      - ["ex-property:pegelhoehe", "$(pegelhoehe)", xsd:decimal]
      - ["ex-property:pegel", "$(pegel)", xsd:decimal]

  spatialCode:
    sources:
      - csvSource
    s: "ex-code:basel_klb_birs"
    po:
      - [a, schema:DefinedTerm]
      - [schema:name, "Basel, Kleinbasler Seite, Höhe des Birs-Zuflusses"]

  observationSetLink:
    sources:
      - csvSource
    s: ex:observation-set
    po:
      - [cube:observation, "ex-obs:$(timestamp)~iri"]