prefixes:
  rml: "http://semweb.mmlab.be/ns/rml#"
  rr: "http://www.w3.org/ns/r2rml#"
  ql: "http://semweb.mmlab.be/ns/ql#"
  csvw: "http://www.w3.org/ns/csvw#"
  schema: "http://schema.org/"
  cube: "https://cube.link/"
  xsd: "http://www.w3.org/2001/XMLSchema#"
  ex: "https://ld.bs.ch/100170/"
  ex-obs: "https://ld.bs.ch/100170/observation/"
  ex-property: "https://ld.bs.ch/property/"
  ex-code: "https://ld.bs.ch/code/"

sources:
  csvSource:
    access: "{CSV_SOURCE}"
    referenceFormulation: csv

mappings:
  observations:
    sources:
      - csvSource
    s: "ex-obs:$(timestamp)_Basel-Stadt"
    po:
      - [a, cube:Observation]
      - [ex-property:ZEIT, "$(timestamp)", xsd:dateTime]
      - [ex-property:RAUM, "ex-code:Basel-Stadt~iri"]
      - [ex-property:general_level, "$(general_level)", xsd:decimal]
      - [ex-property:level_00025, "$(level_00025)", xsd:decimal]
      - [ex-property:level_00031_5, "$(level_00031_5)", xsd:decimal]
      - [ex-property:level_00040, "$(level_00040)", xsd:decimal]
      - [ex-property:level_00050, "$(level_00050)", xsd:decimal]
      - [ex-property:level_00063, "$(level_00063)", xsd:decimal]
      - [ex-property:level_00080, "$(level_00080)", xsd:decimal]
      - [ex-property:level_00100, "$(level_00100)", xsd:decimal]
      - [ex-property:level_00125, "$(level_00125)", xsd:decimal]
      - [ex-property:level_00160, "$(level_00160)", xsd:decimal]
      - [ex-property:level_00200, "$(level_00200)", xsd:decimal]
      - [ex-property:level_00250, "$(level_00250)", xsd:decimal]
      - [ex-property:level_00315, "$(level_00315)", xsd:decimal]
      - [ex-property:level_00400, "$(level_00400)", xsd:decimal]
      - [ex-property:level_00500, "$(level_00500)", xsd:decimal]
      - [ex-property:level_00630, "$(level_00630)", xsd:decimal]
      - [ex-property:level_00800, "$(level_00800)", xsd:decimal]
      - [ex-property:level_01000, "$(level_01000)", xsd:decimal]
      - [ex-property:level_01250, "$(level_01250)", xsd:decimal]
      - [ex-property:level_01600, "$(level_01600)", xsd:decimal]
      - [ex-property:level_02000, "$(level_02000)", xsd:decimal]
      - [ex-property:level_02500, "$(level_02500)", xsd:decimal]
      - [ex-property:level_03150, "$(level_03150)", xsd:decimal]
      - [ex-property:level_04000, "$(level_04000)", xsd:decimal]
      - [ex-property:level_05000, "$(level_05000)", xsd:decimal]
      - [ex-property:level_06300, "$(level_06300)", xsd:decimal]
      - [ex-property:level_08000, "$(level_08000)", xsd:decimal]
      - [ex-property:level_10000, "$(level_10000)", xsd:decimal]
      - [ex-property:level_12500, "$(level_12500)", xsd:decimal]
      - [ex-property:level_16000, "$(level_16000)", xsd:decimal]
  raum:
    sources:
      - csvSource
    s: "ex-code:Basel-Stadt"
    po:
      - [a, schema:DefinedTerm]
      - [schema:name, "Basel-Stadt"]
  observationSetLink:
    sources:
      - csvSource
    s: ex:observation-set
    po:
      - [cube:observation, "ex-obs:$(timestamp)_Basel-Stadt~iri"]