prefixes:
  rml: "http://semweb.mmlab.be/ns/rml#"
  rr: "http://www.w3.org/ns/r2rml#"
  ql: "http://semweb.mmlab.be/ns/ql#"
  csvw: "http://www.w3.org/ns/csvw#"
  schema: "http://schema.org/"
  cube: "https://cube.link/"
  xsd: "http://www.w3.org/2001/XMLSchema#"
  ex: "https://ld.bs.ch/100294/"
  ex-obs: "https://ld.bs.ch/100294/observation/"
  ex-property: "https://ld.bs.ch/property/"
  ex-code: "https://ld.bs.ch/code/"
sources:
  csvSource:
    access: "{CSV_SOURCE}"
    referenceFormulation: csv

mappings:
  observations:
    sources:
      - csvSource
    s: "ex-obs:$(timestamp)"
    po:
      - [a, cube:Observation]
      - [ex-property:ZEIT, $(timestamp), xsd:dateTime]
      - [ex-property:precipitation, $(precipitation), xsd:decimal]
      - [ex-property:relativehumidityhc, $(relativehumidityhc), xsd:decimal]
      - [ex-property:solarradiation, $(solarradiation), xsd:decimal]
      - [ex-property:airtemperaturehc, $(airtemperaturehc), xsd:decimal]
      - [ex-property:windspeedultrasonic, $(windspeedultrasonic), xsd:decimal]
      - [ex-property:winddirultrasonic, $(winddirultrasonic), xsd:decimal]

  observationSetLink:
    sources:
      - csvSource
    s: ex:observation-set
    po:
      - [cube:observation, "ex-obs:$(timestamp)~iri"]