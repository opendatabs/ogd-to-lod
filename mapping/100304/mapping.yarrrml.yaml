prefixes:
  rml: "http://semweb.mmlab.be/ns/rml#"
  rr: "http://www.w3.org/ns/r2rml#"
  ql: "http://semweb.mmlab.be/ns/ql#"
  csvw: "http://www.w3.org/ns/csvw#"
  schema: "http://schema.org/"
  cube: "https://cube.link/"
  xsd: "http://www.w3.org/2001/XMLSchema#"
  ex: "https://ld.bs.ch/100304/"
  ex-obs: "https://ld.bs.ch/100304/observation/"
  ex-property: "https://ld.bs.ch/property/"
  ex-code: "https://ld.bs.ch/code/"

sources:
  csvSource:
    access: "{CSV_SOURCE}"
    referenceFormulation: csv

mappings:
  observations:
    sources:
      - csvSource
    s: "ex-obs:$(timestamp)_$(year)_$(month)_$(day)_$(quarter)_$(weekofyear)_$(weekday)_$(dayofyear)"
    po:
      - [a, cube:Observation]
      # Temporal (key) dimensions
      - ["ex-property:ZEIT", "$(timestamp)", xsd:dateTime]
      - ["ex-property:date", "$(date)", xsd:date]
      - ["ex-property:year", "$(year)", xsd:gYear]
      - ["ex-property:month", "$(month)", xsd:integer]
      - ["ex-property:day", "$(day)", xsd:integer]
      - ["ex-property:quarter", "ex-code:$(quarter)~iri"]
      - ["ex-property:weekofyear", "ex-code:$(weekofyear)~iri"]
      - ["ex-property:weekday", "ex-code:$(weekday)~iri"]
      - ["ex-property:dayofyear", "ex-code:$(dayofyear)~iri"]
      # Spatial (context, same for all rows)
      - ["ex-property:RAUM", "ex-code:gasversorgungsgebiet~iri"]
      # Measure
      - ["ex-property:value", "$(value)", xsd:decimal]

  # Code/DefinedTerm for quarter
  quarterCodes:
    sources:
      - csvSource
    s: "ex-code:$(quarter)"
    po:
      - [a, schema:DefinedTerm]
      - [schema:name, "$(quarter)"]

  # Code/DefinedTerm for weekofyear
  weekofyearCodes:
    sources:
      - csvSource
    s: "ex-code:$(weekofyear)"
    po:
      - [a, schema:DefinedTerm]
      - [schema:name, "$(weekofyear)"]

  # Code/DefinedTerm for weekday
  weekdayCodes:
    sources:
      - csvSource
    s: "ex-code:$(weekday)"
    po:
      - [a, schema:DefinedTerm]
      - [schema:name, "$(weekday)"]

  # Code/DefinedTerm for dayofyear
  dayofyearCodes:
    sources:
      - csvSource
    s: "ex-code:$(dayofyear)"
    po:
      - [a, schema:DefinedTerm]
      - [schema:name, "$(dayofyear)"]

  # Static spatial coverage code
  raumCode:
    sources:
      - csvSource
    s: "ex-code:gasversorgungsgebiet"
    po:
      - [a, schema:DefinedTerm]
      - [schema:name, "Gasversorgungsgebiet Basel-Stadt u. Umlandgemeinden"]

  observationSetLink:
    sources:
      - csvSource
    s: ex:observation-set
    po:
      - [cube:observation, "ex-obs:$(timestamp)_$(year)_$(month)_$(day)_$(quarter)_$(weekofyear)_$(weekday)_$(dayofyear)~iri"]