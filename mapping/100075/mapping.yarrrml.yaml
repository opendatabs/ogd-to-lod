prefixes:
  rml: "http://semweb.mmlab.be/ns/rml#"
  rr: "http://www.w3.org/ns/r2rml#"
  ql: "http://semweb.mmlab.be/ns/ql#"
  csvw: "http://www.w3.org/ns/csvw#"
  schema: "http://schema.org/"
  cube: "https://cube.link/"
  xsd: "http://www.w3.org/2001/XMLSchema#"
  ex: "https://ld.bs.ch/100075/"
  ex-obs: "https://ld.bs.ch/100075/observation/"
  ex-property: "https://ld.bs.ch/property/"
  ex-code: "https://ld.bs.ch/code/"

sources:
  csvSource:
    access: "{CSV_SOURCE}"
    referenceFormulation: csv

mappings:
  observations:
    sources:
      - csvSource
    s: "ex-obs:$(startdatum_kalenderwoche_monat)_$(kalenderwoche)_$(granularitat)"
    po:
      - [a, cube:Observation]
      - ["ex-property:ZEIT", "$(startdatum_kalenderwoche_monat)", xsd:date]
      - ["ex-property:kalenderwoche", "$(kalenderwoche)", xsd:integer]
      - ["ex-property:granularitat", "$(granularitat)"]
      - ["ex-property:RAUM", "ex-code:BS~iri"]
      - ["ex-property:fahrgaste_einsteiger_innen", "$(fahrgaste_einsteiger_innen)", xsd:decimal]
  kalenderwocheCodes:
    sources:
      - csvSource
    s: "ex-code:$(kalenderwoche)"
    po:
      - [a, schema:DefinedTerm]
      - [schema:name, "$(kalenderwoche)"]
  granularitatCodes:
    sources:
      - csvSource
    s: "ex-code:$(granularitat)"
    po:
      - [a, schema:DefinedTerm]
      - [schema:name, "$(granularitat)"]
  raumBS:
    sources:
      - csvSource
    s: "ex-code:BS"
    po:
      - [a, schema:DefinedTerm]
      - [schema:name, "Basel-Stadt"]
  observationSetLink:
    sources:
      - csvSource
    s: ex:observation-set
    po:
      - [cube:observation, "ex-obs:$(startdatum_kalenderwoche_monat)_$(kalenderwoche)_$(granularitat)~iri"]