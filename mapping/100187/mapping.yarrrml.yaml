prefixes:
  rml: "http://semweb.mmlab.be/ns/rml#"
  rr: "http://www.w3.org/ns/r2rml#"
  ql: "http://semweb.mmlab.be/ns/ql#"
  csvw: "http://www.w3.org/ns/csvw#"
  schema: "http://schema.org/"
  cube: "https://cube.link/"
  xsd: "http://www.w3.org/2001/XMLSchema#"
  ex: "https://ld.bs.ch/100187/"
  ex-obs: "https://ld.bs.ch/100187/observation/"
  ex-property: "https://ld.bs.ch/property/"
  ex-code: "https://ld.bs.ch/code/"

sources:
  csvSource:
    access: "{CSV_SOURCE}"
    referenceFormulation: csv

mappings:
  observations:
    sources:
      - csvSource
    s: "ex-obs:$(datum)_basel"
    po:
      - [a, cube:Observation]
      - [ex-property:ZEIT, "$(datum)", xsd:date]
      - [ex-property:RAUM, "ex-code:basel~iri"]
      - ["ex-property:7_tagemedian_of_e_n1_n2_pro_tag_100_000_pers", "$(7_tagemedian_of_e_n1_n2_pro_tag_100_000_pers)", xsd:decimal]
      - ["ex-property:7t_median_bs_bl", "$(7t_median_bs_bl)", xsd:decimal]

  regionCode:
    sources:
      - csvSource
    s: "ex-code:basel"
    po:
      - [a, schema:DefinedTerm]
      - [schema:name, "ARA Basel, Kanton Basel-Stadt, Allschwil, Binningen, Birsfelden, Bottmingen, Oberwil, Schönenbuch"]

  observationSetLink:
    sources:
      - csvSource
    s: ex:observation-set
    po:
      - [cube:observation, "ex-obs:$(datum)_basel~iri"]