prefixes:
  rml: "http://semweb.mmlab.be/ns/rml#"
  rr: "http://www.w3.org/ns/r2rml#"
  ql: "http://semweb.mmlab.be/ns/ql#"
  csvw: "http://www.w3.org/ns/csvw#"
  schema: "http://schema.org/"
  cube: "https://cube.link/"
  xsd: "http://www.w3.org/2001/XMLSchema#"
  ex: "https://ld.tg.ch/sk-stat-141/"
  ex-obs: "https://ld.tg.ch/sk-stat-141/observation/"
  ex-property: "https://ld.tg.ch/property/"
  ex-code: "https://ld.tg.ch/code/"

sources:
  csvSource:
    access: "{CSV_SOURCE}"
    referenceFormulation: csv

mappings:
  observations:
    sources:
      - csvSource
    s: "ex-obs:$(nr)_$(geschaeftsnummer)"
    po:
      - [a, cube:Observation]
      - ["ex-property:nr", "ex-code:$(nr)~iri"]
      - ["ex-property:nachname", "ex-code:$(nachname)~iri"]
      - ["ex-property:vorname", "ex-code:$(vorname)~iri"]
      - ["ex-property:ort", "ex-code:$(ort)~iri"]
      - ["ex-property:partei", "ex-code:$(partei)~iri"]
      - ["ex-property:titel", "ex-code:$(titel)~iri"]
      - ["ex-property:geschaeftsnummer", "ex-code:$(geschaeftsnummer)~iri"]
      - ["ex-property:RAUM", "ex-code:Kanton_Thurgau~iri"]
      - ["ex-property:ZEIT", "2008", xsd:gYear]  # Context: temporal_coverage start; mapped as static value

  nrCodes:
    sources:
      - csvSource
    s: "ex-code:$(nr)"
    po:
      - [a, schema:DefinedTerm]
      - [schema:name, "$(nr)"]

  nachnameCodes:
    sources:
      - csvSource
    s: "ex-code:$(nachname)"
    po:
      - [a, schema:DefinedTerm]
      - [schema:name, "$(nachname)"]

  vornameCodes:
    sources:
      - csvSource
    s: "ex-code:$(vorname)"
    po:
      - [a, schema:DefinedTerm]
      - [schema:name, "$(vorname)"]

  ortCodes:
    sources:
      - csvSource
    s: "ex-code:$(ort)"
    po:
      - [a, schema:DefinedTerm]
      - [schema:name, "$(ort)"]

  parteiCodes:
    sources:
      - csvSource
    s: "ex-code:$(partei)"
    po:
      - [a, schema:DefinedTerm]
      - [schema:name, "$(partei)"]

  titelCodes:
    sources:
      - csvSource
    s: "ex-code:$(titel)"
    po:
      - [a, schema:DefinedTerm]
      - [schema:name, "$(titel)"]

  geschaeftsnummerCodes:
    sources:
      - csvSource
    s: "ex-code:$(geschaeftsnummer)"
    po:
      - [a, schema:DefinedTerm]
      - [schema:name, "$(geschaeftsnummer)"]

  raumCodeKantonThurgau:
    sources:
      - csvSource
    s: "ex-code:Kanton_Thurgau"
    po:
      - [a, schema:DefinedTerm]
      - [schema:name, "Kanton Thurgau"]

  observationSetLink:
    sources:
      - csvSource
    s: ex:observation-set
    po:
      - [cube:observation, "ex-obs:$(nr)_$(geschaeftsnummer)~iri"]