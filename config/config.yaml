# OGD to LOD Configuration
# Environment variables can be referenced using ${VAR} or $VAR syntax

github:
  # Target repository for generated mappings (can also be set via GITHUB_REPO env var)
  repo: "redlink-gmbh/ogd-to-lod-mappings"
  token: "${APP_GITHUB_TOKEN}"
  # Parent folder in the repository for all mappings (default: mapping)
  # mappings_folder: "mapping"

azure:
  endpoint: "${AZURE_OPENAI_ENDPOINT}"
  api_key: "${AZURE_OPENAI_KEY}"
  deployment: "${AZURE_OPENAI_DEPLOYMENT}"
  api_version: "${AZURE_OPENAI_VERSION}"
  # Maximum AI requests before asking user to continue (prevents runaway costs)
  max_requests: 50
  # Pricing in CHF per 1M tokens (adjust based on your Azure OpenAI pricing)
  pricing:
    price_per_1m_input_tokens: 1.02    # CHF per 1M input tokens
    price_per_1m_output_tokens: 8.08   # CHF per 1M output tokens
    price_per_1m_cached_tokens: 0.10   # CHF per 1M cached tokens

sparql:
  # Optional: SPARQL endpoint for querying existing dimensions (V1)
  endpoint: "https://ld.stadt-zuerich.ch/query"

rml:
  # Base URI pattern for generated resources
  base_uri: "https://ld.stadt-zuerich.ch/statistics/"
  # Use Docker for two-step validation: yarrrml-parser → RMLMapper
  rmlmapper_use_docker: true
  # Docker image for RMLMapper (Tier 2 validation, step 2)
  rmlmapper_docker_image: "rmlio/rmlmapper-java:latest"
  # Docker image for yarrrml-parser (Tier 2 validation, step 1)
  yarrrml_parser_docker_image: "rmlio/yarrrml-parser:latest"
